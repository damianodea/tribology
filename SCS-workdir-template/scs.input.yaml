Dataset:
  Atom_types : ['H', 'O', 'S', 'Mo']                                                                           # Atomic species for dataset
  Initial: /leonardo_scratch/fast/IscrB_CNT-HARV/Alberto/Project_MoS2-GO/SCS/Reference/Datasets/Initial/dataset.xyz

Training:
  Model_type : 'MACE'                                                                                    # Model type: 'MACE' or 'DP'
  N_models : 4                                                                                           # Number of models in ensemble
  N_epochs : 100                                                                                         # Number of training epochs
  Reference : '/leonardo_scratch/fast/IscrB_CNT-HARV/Alberto/Project_MoS2-GO/SCS/Reference/Jobs_and_Inputs/training/input_finetuning.yaml'             # Path to reference training input file
  Wait_time : 600                                                                                       # Time between exploration status checks   
  Max_wait_time : 86400                                                                                  # Maximum time allowed for exploration  
  Job : 
    Jobscript: "/leonardo_scratch/fast/IscrB_CNT-HARV/Alberto/Project_MoS2-GO/SCS/Reference/Jobs_and_Inputs/training/job_training.sh"                          # Path to training jobscript
    Job_cmd: ""                                                                                         # Additional commands added to the jobscript
    Local_mode: False
    Max_jobs: 1000
    Wait_seconds: 300
    Max_seconds: 86400    
    Submit_cmd: "sbatch"    
    Query_cmd: "sacct --format=State --noheader -j "
    # State_file: f"{scs_root_dir}/scs.JobManager.yaml"
    # Query_cmd : "squeue -u $USER -o %T -j "                                                               # Command to query job status
    # Query_keys : ['PENDING', 'RUNNING']                                                                  # Output keywords for job status  

Exploration:
