Phase0: #Pressurize calcite surface with O2 molecules
  Geometry:
    Species: {Mo : 95.95, S : 32.065, O : 15.999, H : 1.008}
    Surface_down:
      Structure_1:
        Path: "/leonardo_scratch/fast/IscrB_CNT-HARV/Alberto/Project_MoS2-GO/SCS/Reference/Structures/surfaces/MoS2_ortho_6x4_2layers.xyz"
    Surface_up:
      Structure_1:
        Path: "/leonardo_scratch/fast/IscrB_CNT-HARV/Alberto/Project_MoS2-GO/SCS/Reference/Structures/surfaces/MoS2_ortho_6x4_2layers.xyz"
    Molecules:
      Box: [8.0]
      Density: 1.0 # g/cm^3
      Structure_1: 
        Path: "/leonardo_scratch/fast/IscrB_CNT-HARV/Alberto/Project_MoS2-GO/SCS/Reference/Structures/molecules/H2O.xyz"
        Number: 1000    
  Run:
    Type: 'Relax'
    Load: 3.0 #GPa

    Sampling: 2
    Sampling_mode: "Max_devi"     #Sampling mode: 'Random' or 'Max_devi'    
    Void: {z: 15.0, grp1: "Surface_down", grp2: "Surface_up"}
    Out_freq: 5
    Relative: 0.1
    Min_devi: 0.01        

Phase1: #Apply load to calcite surface with H2 molecules
  Run:
    Type: 'NVT'
    Timestep: 1.0 #fs
    Steps: 500000 #500ps
    Load: 3.0 #GPa
    Sliding: {'x' : 10.0} # 100 m/s    
    Temperature: {Tstart : 1, Tstop : 1000}

    Sampling: 25
    Sampling_mode: "Max_devi"     #Sampling mode: 'Random' or 'Max_devi'    
    Void: {z: 15.0, grp1: "Surface_down", grp2: "Surface_up"}
    Out_freq: 50
    Relative: 0.1
    Min_devi: 0.01      
    Max_cell_size: 60

Phase2: #Apply load to calcite surface with H2 molecules
  Run:
    Type: 'NVT'
    Timestep: 1.0 #fs
    Steps: 500000 #500ps
    Load: 3.0 #GPa
    Sliding: {'x' : 10.0} # 100 m/s    
    Temperature: {Tstart : 1000, Tstop : 1}

    Sampling: 25
    Sampling_mode: "Max_devi"     #Sampling mode: 'Random' or 'Max_devi'    
    Void: {z: 15.0, grp1: "Surface_down", grp2: "Surface_up"}
    Out_freq: 50
    Relative: 0.1
    Min_devi: 0.01      
    Max_cell_size: 60
